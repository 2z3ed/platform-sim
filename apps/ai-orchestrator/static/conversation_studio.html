<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation Studio - 多轮对话仿真工作台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            height: 100vh;
            gap: 1px;
            background: #333;
        }

        .panel {
            background: #16213e;
            padding: 20px;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            color: #00d9ff;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 8px 12px;
            background: #0f3460;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input {
            width: auto;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: #00d9ff;
            color: #000;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #00b8d9;
        }

        .btn-secondary {
            background: #333;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #444;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chat-panel {
            display: flex;
            flex-direction: column;
            background: #0f0f1a;
        }

        .chat-header {
            padding: 15px 20px;
            background: #16213e;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 16px;
            color: #00d9ff;
        }

        .chat-status {
            font-size: 12px;
            color: #888;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-user {
            text-align: right;
        }

        .message-agent {
            text-align: left;
        }

        .message-bubble {
            display: inline-block;
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message-user .message-bubble {
            background: #00d9ff;
            color: #000;
            border-bottom-right-radius: 4px;
        }

        .message-agent .message-bubble {
            background: #2d2d44;
            color: #fff;
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
        }

        .message-agent .message-meta {
            text-align: left;
        }

        .message-source {
            color: #00d9ff;
            font-size: 10px;
            padding: 2px 6px;
            background: #0f3460;
            border-radius: 3px;
            margin-left: 5px;
        }

        .chat-input {
            padding: 15px 20px;
            background: #16213e;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px 15px;
            background: #0f0f1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
        }

        .chat-input input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .debug-panel .debug-section {
            margin-bottom: 20px;
        }

        .debug-section-title {
            font-size: 12px;
            color: #00d9ff;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .debug-item {
            background: #0f3460;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .debug-item label {
            color: #666;
            display: block;
            margin-bottom: 3px;
        }

        .debug-item span {
            color: #fff;
            word-break: break-all;
        }

        .tool-call {
            background: #1a1a2e;
            padding: 8px 10px;
            border-radius: 4px;
            margin-bottom: 6px;
            font-size: 11px;
            border-left: 3px solid #ff6b6b;
        }

        .tool-name {
            color: #ff6b6b;
            font-weight: 600;
        }

        .tool-args {
            color: #888;
            margin-top: 3px;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        .turn-indicator {
            text-align: center;
            padding: 8px;
            background: #1a1a2e;
            color: #888;
            font-size: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #00d9ff;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel control-panel">
            <div class="panel-title">🎛️ 场景控制</div>

            <div class="form-group">
                <label>平台</label>
                <select id="platform">
                    <option value="jd">京东 JD</option>
                    <option value="taobao">淘宝 Taobao</option>
                    <option value="douyin_shop">抖音小店 Douyin</option>
                    <option value="wecom_kf">企微客服 Wecom</option>
                    <option value="xhs">小红书 XHS</option>
                    <option value="kuaishou">快手 Kuaishou</option>
                </select>
            </div>

            <div class="form-group">
                <label>情绪</label>
                <select id="emotion">
                    <option value="calm">😌 平静 Calm</option>
                    <option value="impatient">😤 不耐烦 Impatient</option>
                    <option value="angry">😡 生气 Angry</option>
                </select>
            </div>

            <div class="form-group">
                <label>问题类型</label>
                <select id="issueType">
                    <option value="">自动选择</option>
                    <option value="ask_order_status">查订单状态</option>
                    <option value="ask_shipment">查物流</option>
                    <option value="ask_refund">退款/售后</option>
                    <option value="product_question">商品咨询</option>
                    <option value="complain">投诉</option>
                    <option value="escalate_to_human">转人工</option>
                </select>
            </div>

            <div class="form-group">
                <label>最大轮次</label>
                <select id="maxTurns">
                    <option value="1">1 轮</option>
                    <option value="3" selected>3 轮</option>
                    <option value="5">5 轮</option>
                    <option value="10">10 轮</option>
                </select>
            </div>

            <div class="form-group">
                <label>回复来源</label>
                <select id="replySource">
                    <option value="false">Stub (本地模拟)</option>
                    <option value="true">Official-Sim (官方模拟)</option>
                </select>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="autoAdvance" checked>
                <label for="autoAdvance">自动推进</label>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="showDebug" checked>
                <label for="showDebug">显示调试信息</label>
            </div>

            <button class="btn btn-primary" id="btnStart">开始仿真</button>
            <button class="btn btn-secondary" id="btnNextTurn" disabled>下一轮</button>
            <button class="btn btn-secondary" id="btnReset">重置</button>

            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #333;">
                <div class="form-group">
                    <label>Run ID</label>
                    <input type="text" id="runId" readonly placeholder="等待创建...">
                </div>
                <div class="form-group">
                    <label>Conversation ID</label>
                    <input type="text" id="conversationId" readonly placeholder="等待创建...">
                </div>
            </div>
        </div>

        <div class="panel chat-panel">
            <div class="chat-header">
                <h2>💬 对话窗口</h2>
                <span class="chat-status" id="chatStatus">等待开始</span>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="empty-state">
                    <p>点击「开始仿真」创建新对话</p>
                </div>
            </div>

            <div class="chat-input">
                <input type="text" id="manualMessage" placeholder="输入用户消息... (手动模式)">
                <button class="btn btn-primary" id="btnSend" style="width: auto; padding: 10px 20px;">发送</button>
            </div>
        </div>

        <div class="panel debug-panel" id="debugPanel">
            <div class="panel-title">🔍 调试面板</div>

            <div class="debug-section">
                <div class="debug-section-title">当前事实</div>
                <div class="debug-item">
                    <label>平台</label>
                    <span id="debugPlatform">-</span>
                </div>
                <div class="debug-item">
                    <label>用户ID</label>
                    <span id="debugUserId">-</span>
                </div>
                <div class="debug-item">
                    <label>订单ID</label>
                    <span id="debugOrderId">-</span>
                </div>
                <div class="debug-item">
                    <label>当前轮次</label>
                    <span id="debugTurn">-</span>
                </div>
                <div class="debug-item">
                    <label>当前情绪</label>
                    <span id="debugEmotion">-</span>
                </div>
                <div class="debug-item">
                    <label>当前意图</label>
                    <span id="debugIntent">-</span>
                </div>
            </div>

            <div class="debug-section">
                <div class="debug-section-title">本轮工具调用</div>
                <div id="toolCalls">
                    <div class="empty-state" style="padding: 10px;">暂无工具调用</div>
                </div>
            </div>

            <div class="debug-section">
                <div class="debug-section-title">API 回复来源</div>
                <div class="debug-item">
                    <label>Source</label>
                    <span id="debugReplySource">-</span>
                </div>
            </div>

            <div class="debug-section">
                <div class="debug-section-title">对话历史</div>
                <div id="conversationHistory">
                    <div class="empty-state" style="padding: 10px;">暂无对话</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        let currentRunId = null;
        let currentTurn = 0;
        let autoAdvance = true;
        let isRunning = false;

        const platform = document.getElementById('platform');
        const emotion = document.getElementById('emotion');
        const issueType = document.getElementById('issueType');
        const maxTurns = document.getElementById('maxTurns');
        const replySource = document.getElementById('replySource');
        const autoAdvanceCheck = document.getElementById('autoAdvance');
        const showDebugCheck = document.getElementById('showDebug');

        const btnStart = document.getElementById('btnStart');
        const btnNextTurn = document.getElementById('btnNextTurn');
        const btnReset = document.getElementById('btnReset');
        const btnSend = document.getElementById('btnSend');

        const chatMessages = document.getElementById('chatMessages');
        const chatStatus = document.getElementById('chatStatus');
        const runIdInput = document.getElementById('runId');
        const conversationIdInput = document.getElementById('conversationId');
        const debugPanel = document.getElementById('debugPanel');

        const manualMessageInput = document.getElementById('manualMessage');

        btnStart.addEventListener('click', startConversation);
        btnNextTurn.addEventListener('click', nextTurn);
        btnReset.addEventListener('click', resetConversation);
        btnSend.addEventListener('click', sendManualMessage);
        autoAdvanceCheck.addEventListener('change', (e) => autoAdvance = e.target.checked);
        showDebugCheck.addEventListener('change', (e) => {
            debugPanel.style.display = e.target.checked ? 'block' : 'none';
        });

        async function startConversation() {
            if (isRunning) return;
            isRunning = true;

            try {
                const response = await fetch(`${API_BASE}/conversation-studio/runs`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        platform: platform.value,
                        emotion: emotion.value,
                        max_turns: parseInt(maxTurns.value),
                        use_official_sim: replySource.value === 'true'
                    })
                });

                if (!response.ok) {
                    throw new Error('创建对话失败');
                }

                const data = await response.json();
                currentRunId = data.run_id;

                runIdInput.value = currentRunId;
                conversationIdInput.value = data.conversation_id;

                chatMessages.innerHTML = '';
                currentTurn = 0;

                updateStatus('对话已创建，等待开始...');
                btnStart.disabled = true;
                btnNextTurn.disabled = false;

                isRunning = false;
                await nextTurn();

            } catch (error) {
                console.error('Error:', error);
                removeLoading();
                updateStatus(`错误: ${error.message}`);
                isRunning = false;
            }
        }

        async function nextTurn() {
            if (!currentRunId || isRunning) return;
            isRunning = true;

            showLoading();

            try {
                const requestBody = {};
                if (issueType.value) {
                    requestBody.override_intent = issueType.value;
                }
                requestBody.override_emotion = emotion.value;

                const response = await fetch(`${API_BASE}/conversation-studio/runs/${currentRunId}/next`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    throw new Error('获取回复失败');
                }

                const data = await response.json();
                removeLoading();
                currentTurn = data.turn_no;

                addMessage('user', data.user_message, data.intent, data.emotion);
                addMessage('agent', data.reply_message, null, null, data.reply_source);

                updateDebugInfo(data);
                updateStatus(`第 ${currentTurn} 轮完成`);

                if (!data.continue_suggested) {
                    updateStatus('对话已结束');
                    btnNextTurn.disabled = true;
                    isRunning = false;
                    return;
                }

                if (autoAdvance && currentTurn < parseInt(maxTurns.value)) {
                    isRunning = false;
                    setTimeout(nextTurn, 1500);
                } else {
                    isRunning = false;
                }

            } catch (error) {
                console.error('Error:', error);
                removeLoading();
                updateStatus(`错误: ${error.message}`);
                isRunning = false;
            }
        }

        function resetConversation() {
            currentRunId = null;
            currentTurn = 0;
            isRunning = false;

            chatMessages.innerHTML = '<div class="empty-state"><p>点击「开始仿真」创建新对话</p></div>';
            updateStatus('等待开始');

            runIdInput.value = '';
            conversationIdInput.value = '';

            btnStart.disabled = false;
            btnNextTurn.disabled = true;

            document.getElementById('debugPlatform').textContent = '-';
            document.getElementById('debugUserId').textContent = '-';
            document.getElementById('debugOrderId').textContent = '-';
            document.getElementById('debugTurn').textContent = '-';
            document.getElementById('debugEmotion').textContent = '-';
            document.getElementById('debugIntent').textContent = '-';
            document.getElementById('debugReplySource').textContent = '-';
            document.getElementById('toolCalls').innerHTML = '<div class="empty-state" style="padding: 10px;">暂无工具调用</div>';
        }

        function addMessage(role, content, intent, emotion, source = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${role}`;

            const intentLabel = intent ? `<span class="message-source">${intent}</span>` : '';
            const sourceLabel = source ? `<span class="message-source">${source}</span>` : '';

            messageDiv.innerHTML = `
                <div class="message-bubble">${escapeHtml(content)}</div>
                <div class="message-meta">
                    ${role === 'agent' ? sourceLabel : ''}
                    ${role === 'user' ? intentLabel : ''}
                </div>
            `;

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function updateDebugInfo(data) {
            document.getElementById('debugTurn').textContent = `${data.turn_no} / ${maxTurns.value}`;
            document.getElementById('debugEmotion').textContent = data.emotion;
            document.getElementById('debugIntent').textContent = data.intent;
            document.getElementById('debugReplySource').textContent = data.reply_source;

            if (data.tool_calls && data.tool_calls.length > 0) {
                const toolCallsDiv = document.getElementById('toolCalls');
                toolCallsDiv.innerHTML = data.tool_calls.map(tc => `
                    <div class="tool-call">
                        <div class="tool-name">${tc.name}</div>
                        <div class="tool-args">${JSON.stringify(tc.arguments)}</div>
                    </div>
                `).join('');
            }

            document.getElementById('debugPlatform').textContent = platform.value;
        }

        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.id = 'loadingIndicator';
            loadingDiv.innerHTML = '<div class="spinner"></div> 正在生成...';
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeLoading() {
            const loading = document.getElementById('loadingIndicator');
            if (loading) loading.remove();
        }

        function updateStatus(status) {
            chatStatus.textContent = status;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendManualMessage() {
            const message = manualMessageInput.value.trim();
            if (!message) return;

            addMessage('user', message, 'manual', emotion.value);
            manualMessageInput.value = '';

            setTimeout(() => {
                addMessage('agent', '这是一条模拟回复，实际来自 Stub 或 Official-Sim', null, null, 'stub');
            }, 500);
        }
    </script>
</body>
</html>
